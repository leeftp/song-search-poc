<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>うたレコ — 気分で選ぶカラオケ提案</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { height: 100%; }
    .msg-enter { animation: rise .18s ease-out; }
    @keyframes rise { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: none;} }
    .typing span { animation: blink 1.2s infinite; }
    .typing span:nth-child(2){ animation-delay:.2s } .typing span:nth-child(3){ animation-delay:.4s }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
    .chat-scroll::-webkit-scrollbar{ width:8px } .chat-scroll::-webkit-scrollbar-thumb{ background:#cbd5e1; border-radius:8px }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div class="mx-auto max-w-6xl h-screen flex flex-col md:flex-row md:gap-4 md:p-4">

    <!-- Main column: header + filters + chat + composer -->
    <div class="flex flex-col flex-1 min-h-0 bg-white md:rounded-2xl md:border md:border-slate-200 md:shadow-sm overflow-hidden">

      <!-- Header -->
      <header class="flex items-center gap-3 px-4 py-3 bg-white border-b border-slate-200 shadow-sm">
        <div class="w-9 h-9 rounded-xl bg-indigo-600 text-white grid place-items-center text-lg">♪</div>
        <div class="flex-1">
          <h1 class="font-semibold leading-tight">うたレコ</h1>
          <p class="text-xs text-slate-500 leading-tight">気分を伝えると歌える曲を提案します</p>
        </div>
        <select id="model" class="text-sm border border-slate-300 rounded-lg px-2 py-1.5 bg-white">
          <option value="gpt-5.4-mini">gpt-5.4-mini</option>
          <option value="claude-haiku-4-5">claude-haiku-4-5</option>
          <option value="gemini-3.1-flash-lite" selected>gemini-3.1-flash-lite</option>
        </select>
        <button id="openSettings" title="設定" class="w-9 h-9 grid place-items-center rounded-lg hover:bg-slate-100 text-slate-600">⚙</button>
      </header>

      <!-- Situation filters（枠外の状況選択。選んだ内容はサーバに送られ推薦に反映される） -->
      <div class="flex flex-wrap items-center gap-1.5 px-4 py-2 bg-slate-50 border-b border-slate-200">
        <select id="f-mood" class="text-xs border border-slate-300 rounded-md px-1.5 py-1 bg-white">
          <option value="">気分: 未選択</option>
          <option>賑やか</option><option>しっとり</option><option>盛り上がる</option>
          <option>リラックス</option><option>ノスタルジック</option>
        </select>
        <select id="f-emotion" class="text-xs border border-slate-300 rounded-md px-1.5 py-1 bg-white">
          <option value="">感情: 未選択</option>
          <option>嬉しい</option><option>悲しい</option><option>元気</option>
          <option>寂しい</option><option>不安</option>
        </select>
        <select id="f-region" class="text-xs border border-slate-300 rounded-md px-1.5 py-1 bg-white">
          <option value="">地域: 未選択</option>
          <option>北海道・東北</option><option>関東</option><option>中部</option>
          <option>関西</option><option>中国・四国</option><option>九州・沖縄</option>
        </select>
        <select id="f-group" class="text-xs border border-slate-300 rounded-md px-1.5 py-1 bg-white">
          <option value="">人数: 未選択</option>
          <option>1人</option><option>2人</option><option>3〜4人</option><option>5人以上</option>
        </select>
        <select id="f-age" class="text-xs border border-slate-300 rounded-md px-1.5 py-1 bg-white">
          <option value="">年代: 未選択</option>
          <option>10代</option><option>20代</option><option>30代</option>
          <option>40代</option><option>50代以上</option>
        </select>
      </div>

      <!-- Messages -->
      <main id="chat" class="chat-scroll flex-1 overflow-y-auto px-4 py-4 space-y-3"></main>

      <!-- Composer -->
      <footer class="px-3 py-3 bg-white border-t border-slate-200">
        <div class="flex items-end gap-2">
          <button id="mic" title="音声入力" class="shrink-0 w-11 h-11 rounded-full border border-slate-300 text-slate-600 grid place-items-center active:scale-95 transition">🎤</button>
          <textarea id="input" rows="1" placeholder="今の気分や歌いたい雰囲気を入力…（例: 雨の日にしっとり泣ける曲）"
            class="flex-1 resize-none max-h-32 border border-slate-300 rounded-2xl px-4 py-2.5 text-[15px] focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
          <button id="send" class="shrink-0 w-11 h-11 rounded-full bg-indigo-600 text-white grid place-items-center disabled:opacity-40 active:scale-95 transition">➤</button>
        </div>
        <p id="hint" class="text-[11px] text-slate-400 mt-1.5 px-1">🎤で音声入力できます。曲は楽曲DBに実在するものだけ提案します。</p>
      </footer>
    </div>

    <!-- Side panel: おすすめ楽曲（リンク・選択はチャット枠外） -->
    <aside class="w-full md:w-80 shrink-0 flex flex-col min-h-0 bg-white md:rounded-2xl md:border md:border-slate-200 md:shadow-sm border-t md:border-t-0 border-slate-200 max-h-72 md:max-h-none">
      <div class="px-4 py-3 border-b border-slate-200 shrink-0">
        <h2 class="font-semibold text-sm">楽曲リンク</h2>
        <p class="text-[11px] text-slate-400 leading-tight">チャット内のカードをタップすると歌唱履歴に記録されます</p>
      </div>
      <div id="recoList" class="flex-1 overflow-y-auto p-3 space-y-1.5">
        <p class="text-xs text-slate-400 px-1">まだ提案がありません</p>
      </div>
    </aside>
  </div>

  <!-- Settings modal -->
  <div id="settings" class="hidden fixed inset-0 z-20 bg-black/40 grid place-items-center p-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-5 space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="font-semibold text-lg">APIキー設定</h2>
        <button id="closeSettings" class="text-slate-400 hover:text-slate-600 text-xl leading-none">×</button>
      </div>
      <p class="text-xs text-slate-500">キーはサーバ側にのみ保存され、画面には戻りません（確認はマスク表示）。</p>
      <div class="space-y-3">
        <label class="block">
          <span class="text-sm font-medium">OpenAI <span id="st-openai" class="text-xs text-slate-400"></span></span>
          <input data-prov="openai" type="password" placeholder="sk-..." class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" />
        </label>
        <label class="block">
          <span class="text-sm font-medium">Gemini <span id="st-gemini" class="text-xs text-slate-400"></span></span>
          <input data-prov="gemini" type="password" placeholder="AIza..." class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" />
        </label>
        <label class="block">
          <span class="text-sm font-medium">Anthropic <span id="st-anthropic" class="text-xs text-slate-400"></span></span>
          <input data-prov="anthropic" type="password" placeholder="sk-ant-..." class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" />
        </label>
      </div>
      <button id="saveKeys" class="w-full bg-indigo-600 text-white rounded-lg py-2.5 font-medium active:scale-[.99]">保存</button>
      <p id="keyMsg" class="text-sm text-center"></p>
    </div>
  </div>

  <script>
    const API = location.origin;
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    // フィルターが選択されたら見た目を変えてアクティブ状態を示す
    const filterIds = ["f-mood","f-emotion","f-region","f-group","f-age"];
    filterIds.forEach(id => {
      const sel = document.getElementById(id);
      const update = () => {
        sel.classList.toggle("border-indigo-400", !!sel.value);
        sel.classList.toggle("text-indigo-700", !!sel.value);
        sel.classList.toggle("font-medium",      !!sel.value);
      };
      sel.addEventListener("change", update);
      update();
    });

    // user_id / session_id を localStorage に永続化（ユーザごとの履歴・好み学習に使う）
    let userId = localStorage.getItem("uta_user_id");
    if (!userId) { userId = "u-" + Math.random().toString(36).slice(2, 10); localStorage.setItem("uta_user_id", userId); }
    let sessionId = localStorage.getItem("uta_session_id") || null;

    function esc(s){ return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

    function bubble(role, html){
      const wrap = document.createElement("div");
      wrap.className = "msg-enter flex " + (role === "user" ? "justify-end" : "justify-start");
      const b = document.createElement("div");
      b.className = role === "user"
        ? "max-w-[82%] bg-indigo-600 text-white rounded-2xl rounded-br-md px-4 py-2.5 text-[15px] whitespace-pre-wrap"
        : "max-w-[82%] bg-white border border-slate-200 rounded-2xl rounded-bl-md px-4 py-2.5 text-[15px] whitespace-pre-wrap";
      b.innerHTML = html;
      wrap.appendChild(b);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
      return b;
    }

    // ---- チャット内の楽曲カード（カードタップで選択、リンクは枠外パネルへ） ----
    const confMeta = c => ({
      high:   ["一致", "bg-emerald-100 text-emerald-700"],
      medium: ["近い", "bg-amber-100 text-amber-700"],
    }[c] || [c || "", "bg-slate-100 text-slate-600"]);

    function songCardsHtml(songs) {
      if (!songs || !songs.length) return "";
      return '<div class="mt-1.5 space-y-0">' + songs.map((s, i) => {
        const [label, cls] = confMeta(s.confidence);
        return `<div data-songidx="${i}" class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1 cursor-pointer hover:bg-indigo-50 hover:border-indigo-200 active:scale-[.99] transition-colors select-none">
          <span class="flex-1 min-w-0 truncate text-sm"><span class="font-medium">${esc(s.title)}</span><span class="text-slate-500"> · ${esc(s.artist)}</span></span>
          <span class="text-[10px] font-mono text-slate-400 shrink-0 hidden sm:inline">${esc(s.song_id)}</span>
          <span title="楽曲DBとの照合一致度（おすすめ度ではありません）" class="text-[10px] px-1.5 py-0.5 rounded shrink-0 ${cls}">${esc(label)}</span>
        </div>`;
      }).join("") + "</div>";
    }

    async function selectSong(song, cardEl) {
      if (cardEl.dataset.selected) return;  // 二重登録を防ぐ
      cardEl.dataset.selected = "1";
      cardEl.classList.add("ring-2", "ring-emerald-300", "bg-emerald-50", "border-emerald-300");
      cardEl.classList.remove("hover:bg-indigo-50", "hover:border-indigo-200");
      const title = cardEl.querySelector("span.font-medium");
      if (title) title.textContent += " ✓";
      bubble("assistant", `「${esc(song.title)}」を再生します。`);
      try {
        await fetch(API + "/songs/select", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ user_id: userId, song_id: song.song_id, title: song.title, artist: song.artist, genre: song.genre || "" })
        });
      } catch (_) {}
    }

    function attachSongListeners(bubbleEl, songs) {
      bubbleEl.querySelectorAll("[data-songidx]").forEach(card => {
        const i = Number(card.dataset.songidx);
        card.addEventListener("click", () => selectSong(songs[i], card));
      });
    }

    // ---- 枠外リンクパネル（YouTube/Spotifyリンクのみ。カードはチャット内） ----
    const recoList = document.getElementById("recoList");
    let lastSongs = [];

    function renderRecoPanel(songs) {
      lastSongs = songs || [];
      if (!lastSongs.length) {
        recoList.innerHTML = `<p class="text-xs text-slate-400 px-1">まだ提案がありません</p>`;
        return;
      }
      recoList.innerHTML = lastSongs.map(s => {
        const q = encodeURIComponent(`${s.title} ${s.artist}`);
        const yt = `https://www.youtube.com/results?search_query=${q}`;
        const sp = `https://open.spotify.com/search/${q}`;
        return `<div class="flex items-center gap-2 border-b border-slate-100 py-1.5">
          <span class="flex-1 min-w-0 truncate text-xs font-medium">${esc(s.title)}<span class="font-normal text-slate-500"> · ${esc(s.artist)}</span></span>
          <a href="${yt}" target="_blank" rel="noopener" class="shrink-0 text-[11px] text-rose-600 hover:underline">YouTube</a>
          <a href="${sp}" target="_blank" rel="noopener" class="shrink-0 text-[11px] text-emerald-600 hover:underline">Spotify</a>
        </div>`;
      }).join("");
    }

    function typing(){
      const wrap = document.createElement("div");
      wrap.className = "flex justify-start"; wrap.id = "typing";
      wrap.innerHTML = `<div class="bg-white border border-slate-200 rounded-2xl rounded-bl-md px-4 py-3 typing text-slate-400"><span>●</span><span>●</span><span>●</span></div>`;
      chat.appendChild(wrap); chat.scrollTop = chat.scrollHeight;
    }
    function clearTyping(){ document.getElementById("typing")?.remove(); }

    async function send(){
      const text = input.value.trim();
      if (!text) return;
      input.value = ""; input.style.height = "auto";
      sendBtn.disabled = true;
      // アクティブなフィルターをユーザーバブルに表示
      const filterLabels = {"f-mood":"気分","f-emotion":"感情","f-region":"地域","f-group":"人数","f-age":"年代"};
      const activeTags = filterIds.map(id => {
        const v = document.getElementById(id).value;
        return v ? `<span class="inline-block bg-indigo-100 text-indigo-700 text-[10px] px-1.5 py-0.5 rounded mr-1">${filterLabels[id]}:${esc(v)}</span>` : "";
      }).join("");
      bubble("user", esc(text) + (activeTags ? `<div class="mt-1">${activeTags}</div>` : ""));
      typing();
      try {
        const res = await fetch(API + "/chat", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            message: text, model: document.getElementById("model").value, session_id: sessionId, user_id: userId,
            mood_tag: document.getElementById("f-mood").value,
            emotion: document.getElementById("f-emotion").value,
            region: document.getElementById("f-region").value,
            group_size: document.getElementById("f-group").value,
            age_group: document.getElementById("f-age").value,
          })
        });
        const data = await res.json();
        clearTyping();
        if (!res.ok) { bubble("assistant", `<span class="text-rose-600">⚠ ${esc(data.detail || "エラー")}</span>`); return; }
        sessionId = data.session_id; localStorage.setItem("uta_session_id", sessionId);
        const badge = data.type === "clarification"
          ? `<div class="text-[11px] text-amber-600 mb-1">確認 ${data.clarification_count}/2</div>` : "";
        const cards = data.type === "recommendation" ? songCardsHtml(data.songs) : "";
        const bEl = bubble("assistant", badge + esc(data.message) + cards);
        if (data.type === "recommendation") {
          attachSongListeners(bEl, data.songs);
          renderRecoPanel(data.songs);
        }
      } catch (e) {
        clearTyping();
        bubble("assistant", `<span class="text-rose-600">⚠ 通信エラー: ${esc(String(e))}</span>`);
      } finally { sendBtn.disabled = false; input.focus(); }
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });
    input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 128) + "px"; });

    // ---- 音声入力（ブラウザの Web Speech API。Chrome/Edge対応、ja-JP） ----
    const micBtn = document.getElementById("mic");
    const hint = document.getElementById("hint");
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      micBtn.disabled = true; micBtn.classList.add("opacity-40");
      micBtn.title = "このブラウザは音声入力に未対応（Chrome/Edge推奨）";
    } else {
      const rec = new SR();
      // continuous=false: 発話の自然な切れ目（無音）を検知すると自動的に認識を終了する
      rec.lang = "ja-JP"; rec.interimResults = true; rec.continuous = false;
      let listening = false, base = "", finalText = "", manualStop = false;
      const idleHint = "🎤で音声入力できます。話し終わると自動で送信されます。";
      micBtn.addEventListener("click", () => {
        if (listening) { manualStop = true; rec.stop(); return; }  // もう一度押すと送信せず停止
        manualStop = false; finalText = "";
        base = input.value ? input.value.trimEnd() + " " : "";
        try { rec.start(); } catch (_) {}
      });
      rec.onstart = () => { listening = true; micBtn.classList.add("bg-rose-100","border-rose-300","animate-pulse"); hint.textContent = "🎙 聞き取り中…話し終わると自動送信されます"; };
      rec.onend = () => {
        listening = false; micBtn.classList.remove("bg-rose-100","border-rose-300","animate-pulse"); hint.textContent = idleHint;
        const text = (base + finalText).trim();
        if (!manualStop && text) {
          input.value = text;
          input.dispatchEvent(new Event("input"));
          send();  // 音声入力の終了を検知したら、認識済みメッセージを直接サーバに送信する
        }
        input.focus();
      };
      rec.onerror = (e) => {
        if (e.error === "no-speech" || e.error === "aborted") return;
        manualStop = true;
        hint.textContent = "音声入力エラー: " + e.error + (e.error === "not-allowed" ? "（マイク許可が必要）" : "");
      };
      rec.onresult = (e) => {
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const r = e.results[i];
          if (r.isFinal) finalText += r[0].transcript; else interim += r[0].transcript;
        }
        input.value = base + finalText + interim;
        input.dispatchEvent(new Event("input"));
      };
    }

    // ---- 設定パネル ----
    const settings = document.getElementById("settings");
    async function refreshKeyStatus(){
      try {
        const r = await fetch(API + "/config/keys"); const d = await r.json();
        for (const p of ["openai","gemini","anthropic"]) {
          const el = document.getElementById("st-" + p);
          el.textContent = d[p].set ? `（設定済み ${d[p].masked}）` : "（未設定）";
          el.className = "text-xs " + (d[p].set ? "text-emerald-600" : "text-slate-400");
        }
      } catch(_) {}
    }
    document.getElementById("openSettings").addEventListener("click", () => { settings.classList.remove("hidden"); refreshKeyStatus(); });
    document.getElementById("closeSettings").addEventListener("click", () => settings.classList.add("hidden"));
    settings.addEventListener("click", e => { if (e.target === settings) settings.classList.add("hidden"); });

    document.getElementById("saveKeys").addEventListener("click", async () => {
      const payload = {};
      document.querySelectorAll("#settings input[data-prov]").forEach(i => { if (i.value.trim()) payload[i.dataset.prov] = i.value.trim(); });
      const msg = document.getElementById("keyMsg");
      if (!Object.keys(payload).length) { msg.textContent = "入力されたキーがありません"; msg.className = "text-sm text-center text-slate-500"; return; }
      const r = await fetch(API + "/config/keys", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload) });
      const d = await r.json();
      msg.textContent = d.message; msg.className = "text-sm text-center text-emerald-600";
      document.querySelectorAll("#settings input[data-prov]").forEach(i => i.value = "");
      refreshKeyStatus();
    });

    // 初期メッセージ
    bubble("assistant", "こんにちは！いまの気分や、歌いたいシーンを教えてください。\nうまく伝わらないときは何度か聞き返します（最大2回）。");
    refreshKeyStatus();
  </script>
</body>
</html>
